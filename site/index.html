<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task Tracker</title>
  <style>
    :root {
      --bg: #100a3b;
      --bg2: #1d0f56;
      --card: #1b1450;
      --card2: #281e6a;
      --text: #f7f1ff;
      --muted: #c8c1e6;
      --line: #3f338d;
      --gold: #f0b668;
      --gold-soft: #3f2b1a;
      --danger: #ff7f9f;
      --ok: #64e59d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1e1262 0%, var(--bg) 55%) fixed;
      color: var(--text);
    }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 16px; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(36, 27, 97, 0.95), rgba(26, 20, 80, 0.95));
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      animation: fadeInUp 300ms ease-out;
    }
    .topbar {
      display: grid; gap: 12px; grid-template-columns: 1fr;
      margin-bottom: 12px;
    }
    @media (min-width: 960px) {
      .topbar { grid-template-columns: 1.5fr 1fr; }
    }
    .header { padding: 14px; }
    .title {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 10px;
    }
    h1 { margin: 0; font-size: 26px; color: var(--gold); letter-spacing: 0.2px; }
    .stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      border: 1px solid var(--line);
      background: rgba(18, 12, 62, 0.8);
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
    }
    .chip strong { color: #fff; }
    .quick { display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px; }
    @media (max-width: 760px) {
      .quick { grid-template-columns: 1fr 1fr; }
      .quick input { grid-column: 1 / -1; }
    }
    input, select, button, textarea {
      background: #130d45;
      color: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
    }
    input::placeholder, textarea::placeholder { color: #aba4cb; }
    button {
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(180deg, #5f3dbf, #4a2e9d);
    }
    button.secondary {
      background: #1a124e;
      color: var(--muted);
      font-weight: 600;
    }
    .filters {
      padding: 14px;
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
      align-content: start;
    }
    .layout { display: grid; gap: 12px; grid-template-columns: 1fr; }
    @media (min-width: 1180px) {
      .layout { grid-template-columns: minmax(0, 1fr) 330px; }
    }
    .board {
      display: grid; gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    @media (min-width: 900px) {
      .board { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }
    .col {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(31, 22, 90, 0.85);
      min-height: 220px;
      padding: 10px;
    }
    .col-head {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; font-weight: 800; color: #fff;
      margin-bottom: 8px;
    }
    .count { font-size: 12px; color: var(--muted); }
    .dropzone { min-height: 150px; }
    .task {
      border: 1px solid #5b4ab9;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(42, 30, 106, 0.95), rgba(30, 22, 84, 0.95));
      padding: 9px;
      margin-bottom: 8px;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      animation: fadeInUp 220ms ease-out;
    }
    .task:hover {
      transform: translateY(-2px);
      border-color: #836ceb;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.2);
    }
    .task.dragging { opacity: 0.6; }
    .task h3 { margin: 0 0 6px; font-size: 14px; line-height: 1.3; color: #fff; }
    .task p { margin: 0; color: var(--muted); font-size: 12px; }
    .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .badge {
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid #5e4fc0;
      color: #d7d0f6;
      padding: 3px 7px;
      background: #211760;
    }
    .p1 { color: #ffd4e0; border-color: #e57a9a; background: #4c1f38; }
    .p2 { color: #ffe6c6; border-color: #dd9a5b; background: #4b2f1a; }
    .due-overdue { color: #ffd4e0; border-color: #e57a9a; background: #4b1f32; }
    .due-soon { color: #ffe6c6; border-color: #dd9a5b; background: #4f3119; }
    .task-actions { display: flex; gap: 6px; margin-top: 8px; }
    .task-actions button { padding: 5px 8px; font-size: 12px; }
    .empty {
      border: 1px dashed #5e4ec0;
      color: #b6aedf;
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
    }
    .details { padding: 12px; }
    .details h2 { margin: 0 0 8px; color: var(--gold); }
    .details small { color: var(--muted); }
    .details .block { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
    .details ul { margin: 8px 0 0; padding-left: 18px; color: var(--muted); font-size: 13px; }
    .foot-note { margin-top: 10px; font-size: 12px; color: #aea7d5; }
    .success-pop {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: #1f7a45;
      border: 1px solid #42d27f;
      color: #eafff3;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
      z-index: 40;
    }
    .success-pop.show { opacity: 1; }
    .mascot-wrap {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .mascot-bubble {
      max-width: 260px;
      background: linear-gradient(180deg, #3a2788, #2a1d65);
      border: 1px solid #715adb;
      color: #efe8ff;
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
      transform-origin: bottom right;
      animation: bubbleIn 240ms ease;
    }
    .mascot {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 2px solid #7a66dc;
      background: radial-gradient(circle at 30% 30%, #f4c47f 0%, #c68e52 35%, #6f4a23 100%);
      position: relative;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.28);
      cursor: pointer;
      animation: floatY 2.8s ease-in-out infinite;
    }
    .mascot:before, .mascot:after {
      content: "";
      position: absolute;
      top: 20px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2d1a0c;
    }
    .mascot:before { left: 16px; }
    .mascot:after { right: 16px; }
    .mascot-mouth {
      position: absolute;
      left: 50%;
      bottom: 13px;
      width: 18px;
      height: 10px;
      transform: translateX(-50%);
      border-bottom: 3px solid #2d1a0c;
      border-radius: 0 0 12px 12px;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: scale(0.95) translateY(4px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="topbar">
      <div class="panel header">
        <div class="title">
          <h1>Task Tracker</h1>
          <div class="stats">
            <span class="chip"><strong id="stat-all">0</strong> задач</span>
            <span class="chip"><strong id="stat-overdue">0</strong> overdue</span>
            <span class="chip"><strong id="stat-today">0</strong> today</span>
          </div>
        </div>
        <div class="quick">
          <input id="quickTitle" placeholder="Быстро добавить задачу...">
          <select id="quickPriority">
            <option value="p3">P3 Normal</option>
            <option value="p1">P1 Critical</option>
            <option value="p2">P2 High</option>
            <option value="p4">P4 Low</option>
          </select>
          <input id="quickDue" type="date">
          <button id="addBtn">Добавить</button>
        </div>
      </div>
      <div class="panel filters">
        <input id="search" type="search" placeholder="Поиск">
        <select id="filterPriority">
          <option value="">Все приоритеты</option>
          <option value="p1">P1</option>
          <option value="p2">P2</option>
          <option value="p3">P3</option>
          <option value="p4">P4</option>
        </select>
        <select id="filterDue">
          <option value="">Любые сроки</option>
          <option value="today">Today</option>
          <option value="overdue">Overdue</option>
        </select>
        <button class="secondary" id="resetBtn">Сбросить фильтры</button>
      </div>
    </section>

    <section class="layout">
      <section class="board" id="board"></section>
      <aside class="panel details" id="details">
        <h2>Детали задачи</h2>
        <small>Нажми на карточку, чтобы редактировать</small>
        <div class="block">
          <label>Название</label>
          <input id="dTitle" placeholder="Название">
        </div>
        <div class="block">
          <label>Описание</label>
          <textarea id="dDesc" rows="4" placeholder="Описание"></textarea>
        </div>
        <div class="block">
          <label>Приоритет</label>
          <select id="dPriority">
            <option value="p1">P1 Critical</option>
            <option value="p2">P2 High</option>
            <option value="p3">P3 Normal</option>
            <option value="p4">P4 Low</option>
          </select>
        </div>
        <div class="block">
          <label>Срок</label>
          <input id="dDue" type="date">
        </div>
        <div class="block">
          <button id="saveDetails">Сохранить</button>
          <button class="secondary" id="deleteTask">Удалить</button>
        </div>
        <div class="foot-note">
          Данные сохраняются в браузере пользователя (localStorage), поэтому каждый может пользоваться сам по ссылке и вести свои задачи.
        </div>
      </aside>
    </section>
  </div>
  <div class="success-pop" id="successPop">Сохранено</div>
  <div class="mascot-wrap">
    <div class="mascot-bubble" id="mascotBubble">Привет! Я помогу не пропустить сроки.</div>
    <button class="mascot" id="mascotBtn" aria-label="Совет дня">
      <span class="mascot-mouth"></span>
    </button>
  </div>

  <script>
    const STATUSES = [
      { id: "inbox", label: "Inbox" },
      { id: "planned", label: "Planned" },
      { id: "in_progress", label: "In Progress" },
      { id: "waiting", label: "Waiting" },
      { id: "done", label: "Done" },
    ];

    const STORAGE_KEY = "ptt-pages-tasks-v2";
    let selectedTaskId = null;
    let mascotTimer = null;

    const defaultTasks = [
      { id: crypto.randomUUID(), title: "Собрать идеи на неделю", desc: "", status: "inbox", priority: "p3", due: "", createdAt: Date.now() },
      { id: crypto.randomUUID(), title: "Закрыть срочный платеж", desc: "", status: "planned", priority: "p1", due: dateOffset(-1), createdAt: Date.now() },
      { id: crypto.randomUUID(), title: "Сделать тренировку", desc: "45 минут, фокус на кардио", status: "in_progress", priority: "p2", due: dateOffset(0), createdAt: Date.now() },
      { id: crypto.randomUUID(), title: "Жду ответ от банка", desc: "", status: "waiting", priority: "p2", due: "", createdAt: Date.now() },
    ];

    function dateOffset(days) {
      const d = new Date();
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    }

    function loadTasks() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultTasks));
        return [...defaultTasks];
      }
      try {
        return JSON.parse(raw);
      } catch {
        return [...defaultTasks];
      }
    }

    function saveTasks(tasks) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function badgeDue(due) {
      if (!due) return "";
      const today = new Date().toISOString().slice(0, 10);
      if (due < today) return `<span class="badge due-overdue">Overdue ${due}</span>`;
      if (due === today) return `<span class="badge due-soon">Today ${due}</span>`;
      return `<span class="badge">Due ${due}</span>`;
    }

    function getPriorityLabel(p) {
      if (p === "p1") return "P1";
      if (p === "p2") return "P2";
      if (p === "p4") return "P4";
      return "P3";
    }

    function render() {
      const tasks = loadTasks();
      const board = document.getElementById("board");
      const search = document.getElementById("search").value.toLowerCase().trim();
      const fp = document.getElementById("filterPriority").value;
      const fd = document.getElementById("filterDue").value;
      const today = new Date().toISOString().slice(0, 10);

      const filtered = tasks.filter(t => {
        if (search && !(`${t.title} ${t.desc}`.toLowerCase().includes(search))) return false;
        if (fp && t.priority !== fp) return false;
        if (fd === "today" && t.due !== today) return false;
        if (fd === "overdue" && !(t.due && t.due < today)) return false;
        return true;
      });

      board.innerHTML = STATUSES.map(s => {
        const colTasks = filtered.filter(t => t.status === s.id);
        return `
          <div class="col" data-status="${s.id}">
            <div class="col-head"><span>${s.label}</span><span class="count">${colTasks.length}</span></div>
            <div class="dropzone" data-status="${s.id}">
              ${colTasks.length ? colTasks.map(taskCard).join("") : `<div class="empty">Пусто. Перетащи сюда задачу или добавь новую.</div>`}
            </div>
          </div>
        `;
      }).join("");

      board.querySelectorAll(".task").forEach(el => {
        el.addEventListener("dragstart", onDragStart);
        el.addEventListener("dragend", onDragEnd);
        el.addEventListener("click", () => openDetails(el.dataset.id));
      });
      board.querySelectorAll(".dropzone").forEach(zone => {
        zone.addEventListener("dragover", e => e.preventDefault());
        zone.addEventListener("drop", onDrop);
      });
      board.querySelectorAll(".btn-done").forEach(btn => btn.addEventListener("click", markDone));
      board.querySelectorAll(".btn-del").forEach(btn => btn.addEventListener("click", deleteFromCard));

      updateStats(tasks);
      updateDetailsPanel();
      updateMascotHint(tasks);
    }

    function taskCard(t) {
      const pClass = t.priority === "p1" ? "p1" : t.priority === "p2" ? "p2" : "";
      return `
        <article class="task" draggable="true" data-id="${t.id}">
          <h3>${escapeHtml(t.title)}</h3>
          ${t.desc ? `<p>${escapeHtml(t.desc)}</p>` : ""}
          <div class="meta">
            <span class="badge ${pClass}">${getPriorityLabel(t.priority)}</span>
            ${badgeDue(t.due)}
          </div>
          <div class="task-actions">
            ${t.status !== "done" ? `<button class="secondary btn-done" data-id="${t.id}">Done</button>` : ""}
            <button class="secondary btn-del" data-id="${t.id}">Удалить</button>
          </div>
        </article>
      `;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (m) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[m]));
    }

    function updateStats(tasks) {
      const today = new Date().toISOString().slice(0, 10);
      const all = tasks.filter(t => t.status !== "done").length;
      const overdue = tasks.filter(t => t.due && t.due < today && t.status !== "done").length;
      const tday = tasks.filter(t => t.due === today && t.status !== "done").length;
      document.getElementById("stat-all").textContent = all;
      document.getElementById("stat-overdue").textContent = overdue;
      document.getElementById("stat-today").textContent = tday;
    }

    function showToast(text) {
      const pop = document.getElementById("successPop");
      pop.textContent = text;
      pop.classList.add("show");
      setTimeout(() => pop.classList.remove("show"), 1200);
    }

    function mascotMessage(tasks) {
      const today = new Date().toISOString().slice(0, 10);
      const overdue = tasks.filter(t => t.due && t.due < today && t.status !== "done").length;
      const dueToday = tasks.filter(t => t.due === today && t.status !== "done").length;
      const done = tasks.filter(t => t.status === "done").length;
      const active = tasks.filter(t => t.status !== "done").length;
      if (overdue > 0) return `Внимание: у тебя ${overdue} просроченных задач. Давай закроем хотя бы одну сейчас.`;
      if (dueToday > 0) return `На сегодня ${dueToday} задач по срокам. Фокус на них даст быстрый прогресс.`;
      if (active === 0) return "Отлично! Активных задач нет. Можно добавить новую цель.";
      if (done > 0) return `Круто, уже закрыто ${done}. Продолжаем в том же ритме!`;
      return "Все спокойно. Добавь задачу в Inbox и разложи по приоритету.";
    }

    function updateMascotHint(tasks) {
      const bubble = document.getElementById("mascotBubble");
      bubble.textContent = mascotMessage(tasks);
      if (mascotTimer) clearInterval(mascotTimer);
      mascotTimer = setInterval(() => {
        const fresh = loadTasks();
        bubble.textContent = mascotMessage(fresh);
      }, 12000);
    }

    function onDragStart(e) {
      e.dataTransfer.setData("task-id", e.currentTarget.dataset.id);
      e.currentTarget.classList.add("dragging");
    }
    function onDragEnd(e) { e.currentTarget.classList.remove("dragging"); }
    function onDrop(e) {
      const taskId = e.dataTransfer.getData("task-id");
      const status = e.currentTarget.dataset.status;
      const tasks = loadTasks();
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      task.status = status;
      saveTasks(tasks);
      render();
      showToast("Задача перемещена");
    }

    function markDone(e) {
      e.stopPropagation();
      const id = e.currentTarget.dataset.id;
      const tasks = loadTasks();
      const t = tasks.find(x => x.id === id);
      if (!t) return;
      t.status = "done";
      saveTasks(tasks);
      render();
      showToast("Отлично! Задача завершена");
    }

    function deleteFromCard(e) {
      e.stopPropagation();
      const id = e.currentTarget.dataset.id;
      const tasks = loadTasks().filter(t => t.id !== id);
      if (selectedTaskId === id) selectedTaskId = null;
      saveTasks(tasks);
      render();
      showToast("Задача удалена");
    }

    function openDetails(id) {
      selectedTaskId = id;
      updateDetailsPanel();
    }

    function updateDetailsPanel() {
      const tasks = loadTasks();
      const t = tasks.find(x => x.id === selectedTaskId);
      const title = document.getElementById("dTitle");
      const desc = document.getElementById("dDesc");
      const priority = document.getElementById("dPriority");
      const due = document.getElementById("dDue");
      if (!t) {
        title.value = "";
        desc.value = "";
        priority.value = "p3";
        due.value = "";
        return;
      }
      title.value = t.title || "";
      desc.value = t.desc || "";
      priority.value = t.priority || "p3";
      due.value = t.due || "";
    }

    function addTask() {
      const titleInput = document.getElementById("quickTitle");
      const pInput = document.getElementById("quickPriority");
      const dInput = document.getElementById("quickDue");
      const title = titleInput.value.trim();
      if (!title) return;
      const tasks = loadTasks();
      tasks.unshift({
        id: crypto.randomUUID(),
        title,
        desc: "",
        status: "inbox",
        priority: pInput.value || "p3",
        due: dInput.value || "",
        createdAt: Date.now(),
      });
      saveTasks(tasks);
      titleInput.value = "";
      dInput.value = "";
      render();
      showToast("Новая задача добавлена");
    }

    function saveDetails() {
      if (!selectedTaskId) return;
      const tasks = loadTasks();
      const t = tasks.find(x => x.id === selectedTaskId);
      if (!t) return;
      t.title = document.getElementById("dTitle").value.trim() || t.title;
      t.desc = document.getElementById("dDesc").value.trim();
      t.priority = document.getElementById("dPriority").value;
      t.due = document.getElementById("dDue").value;
      saveTasks(tasks);
      render();
      showToast("Изменения сохранены");
    }

    function deleteDetails() {
      if (!selectedTaskId) return;
      const tasks = loadTasks().filter(t => t.id !== selectedTaskId);
      selectedTaskId = null;
      saveTasks(tasks);
      render();
      showToast("Задача удалена");
    }

    document.getElementById("addBtn").addEventListener("click", addTask);
    document.getElementById("quickTitle").addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTask();
    });
    document.getElementById("saveDetails").addEventListener("click", saveDetails);
    document.getElementById("deleteTask").addEventListener("click", deleteDetails);
    document.getElementById("search").addEventListener("input", render);
    document.getElementById("filterPriority").addEventListener("change", render);
    document.getElementById("filterDue").addEventListener("change", render);
    document.getElementById("resetBtn").addEventListener("click", () => {
      document.getElementById("search").value = "";
      document.getElementById("filterPriority").value = "";
      document.getElementById("filterDue").value = "";
      render();
    });
    document.getElementById("mascotBtn").addEventListener("click", () => {
      const tasks = loadTasks();
      document.getElementById("mascotBubble").textContent = mascotMessage(tasks);
      showToast("Совет обновлен");
    });

    render();
  </script>
</body>
</html>
